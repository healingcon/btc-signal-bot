name: BTC AI Signal Bot

on:
  schedule:
    - cron: '*/15 * * * *'   # 15분마다
  workflow_dispatch:          # 수동 실행 버튼

jobs:
  run-signal-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: 📥 코드 체크아웃
        uses: actions/checkout@v4

      - name: 🐍 Python 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 📦 패키지 설치
        run: pip install requests

      # 이전 실행의 점수/레벨 상태 불러오기
      - name: 💾 상태 파일 복원
        uses: actions/cache@v4
        with:
          path: signal_state.json
          key: signal-state-${{ github.run_id }}
          restore-keys: signal-state-

      - name: 🤖 시그널 봇 실행
        env:
          TG_TOKEN:        ${{ secrets.TG_TOKEN }}
          TG_CHAT_ID:      ${{ secrets.TG_CHAT_ID }}
          SYMBOL:          ${{ vars.SYMBOL || 'BTCUSDT' }}
          SCORE_THRESHOLD: ${{ vars.SCORE_THRESHOLD || '70' }}
        run: python src/signal_bot.py
