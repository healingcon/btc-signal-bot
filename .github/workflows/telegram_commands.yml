name: 텔레그램 명령어 응답

on:
  schedule:
    - cron: '*/5 * * * *'   # 5분마다 새 메시지 체크
  workflow_dispatch:

jobs:
  respond-commands:
    runs-on: ubuntu-latest
    timeout-minutes: 4

    steps:
      - name: 📥 코드 체크아웃
        uses: actions/checkout@v4

      - name: 🐍 Python 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 📦 패키지 설치
        run: pip install requests

      # 텔레그램 메시지 오프셋 유지 (중복 응답 방지)
      - name: 💾 오프셋 복원
        uses: actions/cache@v4
        with:
          path: tg_offset.json
          key: tg-offset-${{ github.run_id }}
          restore-keys: tg-offset-

      - name: 💬 명령어 체크 & 응답
        env:
          TG_TOKEN:        ${{ secrets.TG_TOKEN }}
          TG_CHAT_ID:      ${{ secrets.TG_CHAT_ID }}
          SYMBOL:          ${{ vars.SYMBOL || 'BTCUSDT' }}
          SCORE_THRESHOLD: ${{ vars.SCORE_THRESHOLD || '70' }}
        run: python src/telegram_command.py
